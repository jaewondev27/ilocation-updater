<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>iLocation</title>
<style>
:root{--blue:#0062FF;--white:#FFF;--card:#F5F5F5;--text:#000;--sub:#888;--danger:#D32F2F}
::-webkit-scrollbar{display:none!important;width:0;height:0}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;scrollbar-width:none;-ms-overflow-style:none}
html,body{overscroll-behavior:none;overflow:hidden;height:100%;height:100dvh}
body{font-family:'SamsungOne',-apple-system,BlinkMacSystemFont,'Malgun Gothic','맑은 고딕',sans-serif;background:var(--white);color:var(--text);user-select:none;-webkit-user-select:none}
.hidden{display:none!important}

#sp{position:fixed;inset:0;background:#fff;z-index:10000;display:flex;flex-direction:column;align-items:center;justify-content:center;transition:opacity .5s ease}
#sp.out{opacity:0;pointer-events:none}
#sp img{width:86px;height:86px;margin-bottom:8px;animation:spB .8s cubic-bezier(.34,1.56,.64,1)}
#sp .sn{font-size:28px;font-weight:700;animation:spF .6s ease .3s both}
@keyframes spB{0%{opacity:0;transform:scale(.5)}100%{opacity:1;transform:scale(1)}}
@keyframes spF{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}

#st{position:fixed;inset:0;background:#fff;z-index:9000;display:flex;flex-direction:column;align-items:center}
.st-top{padding-top:90px;text-align:center}
.st-top img{width:80px;height:80px;margin:0 auto 6px}
.st-top .sn{font-size:26px;font-weight:700}
.st-t{font-size:24px;font-weight:700;margin-top:75px;letter-spacing:-.3px}
.st-cards{width:calc(100% - 48px);max-width:340px;margin-top:30px;display:flex;flex-direction:column;gap:12px}
.st-c{background:var(--card);border-radius:20px;padding:20px 22px;display:flex;align-items:center;gap:16px;cursor:pointer;transition:all .25s cubic-bezier(.4,0,.2,1);border:2px solid transparent;animation:cI .4s ease both}
.st-c:nth-child(2){animation-delay:.08s}
@keyframes cI{from{opacity:0;transform:translateY(15px)}to{opacity:1;transform:translateY(0)}}
.st-c:active{transform:scale(.96)}
.st-c.s{border-color:var(--blue);background:#E8F0FE}
.st-c .ci{width:38px;height:38px;flex-shrink:0}
.st-c .ci svg{width:100%;height:100%}
.st-c .ct{font-size:18px;font-weight:600}
.st-btn{margin-top:auto;margin-bottom:50px;width:calc(100% - 48px);max-width:340px}
.bb{width:100%;height:58px;border-radius:29px;background:var(--blue);color:#fff;border:none;font-size:21px;font-weight:700;cursor:pointer;transition:all .15s}
.bb:disabled{background:#CCC}
.bb:active:not(:disabled){transform:scale(.97);opacity:.9}

#lg{position:fixed;inset:0;background:#fff;z-index:8000;display:flex;flex-direction:column;align-items:center}
.lg-top{margin-top:70px;text-align:center}
.lg-top img{width:80px;height:80px;margin:0 auto 4px}
.lg-top .sn{font-size:26px;font-weight:700}
.lg-mid{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;width:100%;padding:0 28px}
.lg-mid .lt{font-size:28px;font-weight:700;align-self:flex-start;margin-bottom:28px}
.li{width:100%;height:54px;border-radius:27px;border:2px solid #DDD;padding:0 22px;font-size:18px;outline:none;background:#fff;transition:border-color .2s,transform .15s;margin-bottom:10px}
.li:focus{border-color:var(--blue);transform:scale(1.01)}
.li::placeholder{color:#B8B8B8}
.le{color:var(--danger);font-size:14px;margin-top:4px;min-height:16px;text-align:center;width:100%}
.lg-bot{width:100%;padding:0 28px;padding-bottom:60px;display:flex;flex-direction:column;align-items:center}
.lb{width:200px;height:54px;border-radius:27px;background:var(--blue);color:#fff;border:none;font-size:20px;font-weight:700;cursor:pointer;transition:all .15s}
.lb:active{transform:scale(.96);opacity:.9}
.su-link{margin-top:16px;font-size:14px;color:var(--sub)}
.su-link a{color:var(--blue);text-decoration:none;font-weight:600}

#su{position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:8500;display:flex;align-items:flex-end;justify-content:center}
#su .sc{background:#fff;width:100%;max-height:85vh;border-radius:22px 22px 0 0;padding:22px 22px 40px;padding-bottom:calc(40px + env(safe-area-inset-bottom,0px));overflow-y:auto;animation:sU .3s cubic-bezier(.4,0,.2,1)}
@keyframes sU{from{transform:translateY(100%)}to{transform:translateY(0)}}
.sh2{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px}
.sh2 .st2{font-size:20px;font-weight:700}
.sh2 .sx{width:32px;height:32px;border-radius:50%;background:var(--card);border:none;font-size:16px;cursor:pointer}
.sh2 .sx:active{opacity:.6}
.sf{width:100%;height:50px;border-radius:25px;border:1.5px solid #DDD;padding:0 18px;font-size:17px;outline:none;margin-bottom:10px;transition:border-color .2s}
.sf:focus{border-color:var(--blue)}
.sf::placeholder{color:#B8B8B8}
.ir{display:flex;gap:8px}
.ir .sf{flex:1}
.ick{height:50px;padding:0 16px;border-radius:25px;background:var(--blue);color:#fff;border:none;font-size:14px;font-weight:600;cursor:pointer;white-space:nowrap}
.ick:active{opacity:.7}
.im{font-size:14px;margin-bottom:8px;padding-left:4px;min-height:16px}
.im.ok{color:#00A650}.im.no{color:var(--danger)}
.ssb{width:100%;height:52px;border-radius:26px;background:var(--blue);color:#fff;border:none;font-size:17px;font-weight:600;cursor:pointer;margin-top:4px}
.ssb:active{opacity:.8}
.se{color:var(--danger);font-size:14px;margin-top:8px;text-align:center;min-height:16px}

#ap{position:fixed;inset:0;z-index:100;display:flex;flex-direction:column}
#mw{flex:1;position:relative;overflow:hidden}
#mf{width:100%;height:100%;border:none}

/* 모달 바닥 안전영역 추가, 사이즈 및 둥글기 소폭 증가 */
#fmodal{position:absolute;left:12px;right:12px;bottom:calc(12px + env(safe-area-inset-bottom, 0px));z-index:200;display:flex;flex-direction:column;background:var(--white);border-radius:28px;box-shadow:0 -4px 24px rgba(0,0,0,.08);overflow:hidden;transition:height .35s cubic-bezier(.4,0,.2,1)}

/* HANDLE - 모달 안으로 이동 */
#fhandle{width:100%;display:flex;justify-content:center;padding:12px 0 10px;cursor:grab;touch-action:none;flex-shrink:0}
#fhandle .bar{width:40px;height:5px;border-radius:3px;background:rgba(0,0,0,.15)}

#fcontent{flex:1;position:relative;overflow:hidden;min-height:0}

.fm-panel{position:absolute;top:0;left:0;right:0;bottom:0;padding:8px 18px 12px;overflow-y:auto;-webkit-overflow-scrolling:touch}
.fm-panel{display:none}
.fm-panel.active{display:block;animation:pI .3s ease}
@keyframes pI{from{opacity:0;transform:translateX(20px)}to{opacity:1;transform:translateX(0)}}

.fm-lbl{font-size:20px;font-weight:600;padding:4px 0 10px;letter-spacing:-.3px}
.fm-he{display:flex;align-items:center;gap:12px;margin-bottom:12px}
.fm-lo{width:42px;height:42px;flex-shrink:0;border-radius:12px;overflow:hidden}
.fm-lo img{width:100%;height:100%}
.fm-ti{font-size:16px;font-weight:700}
.fm-su{font-size:13px;color:var(--blue);font-weight:500}

.fmc{background:var(--card);border-radius:16px;padding:16px;margin-bottom:8px;display:flex;align-items:center;gap:12px;transition:transform .15s}
.fmc:active{transform:scale(.98)}
.fmc .ma{width:36px;height:36px;flex-shrink:0}
.fmc .ma svg{width:100%;height:100%}
.fmc .mn{font-size:16px;font-weight:600}
.fmc .ms{margin-left:auto;display:flex;align-items:center;gap:8px;font-size:13px;font-weight:500}
.fmc .do{width:9px;height:9px;border-radius:50%}
.fmc .do.on{background:var(--blue)}
.fmc .do.of{background:var(--danger)}
.em{text-align:center;color:var(--sub);font-size:14px;padding:18px 0}

.fm-tabs{display:flex;border-top:1px solid #F0F0F0;flex-shrink:0;height:68px;background:var(--white)}
.ft{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;color:#999;cursor:pointer;transition:color .2s}
.ft:active{opacity:.6}
.ft.a{color:var(--text)}
.ft svg{width:26px;height:26px}
.ft span{font-size:12px;font-weight:500}

.fmb{display:flex;align-items:center;gap:14px;padding:18px 16px;background:var(--card);border-radius:14px;margin-bottom:8px;cursor:pointer;border:none;width:100%;text-align:left;font-size:16px;font-weight:500}
.fmb:active{opacity:.7}
.fmb svg{width:24px;height:24px;color:var(--blue)}
.fmb.da{color:var(--danger)}.fmb.da svg{color:var(--danger)}

/* 더보기 풀스크린 모달 추가 */
#more-screen{position:fixed;inset:0;background:var(--white);z-index:10000;display:flex;flex-direction:column;visibility:hidden;transform:translateX(100%);transition:transform .35s cubic-bezier(.4,0,.2,1), visibility .35s}
#more-screen.open{visibility:visible;transform:translateX(0)}
.ms-header{display:flex;align-items:center;padding:16px 20px;padding-top:calc(16px + env(safe-area-inset-top,0px));border-bottom:1px solid #F0F0F0;background:var(--white)}
.ms-back{width:40px;height:40px;border:none;background:none;display:flex;align-items:center;justify-content:center;cursor:pointer;margin-left:-10px;margin-right:8px}
.ms-back svg{width:28px;height:28px;color:var(--text)}
.ms-back:active{opacity:.6}
.ms-title{font-size:22px;font-weight:700}
.ms-content{flex:1;padding:20px;padding-bottom:calc(20px + env(safe-area-inset-bottom,0px));overflow-y:auto}

#cm{position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:600;display:flex;align-items:flex-end;justify-content:center}
#cm .cb{background:#fff;width:100%;border-radius:22px 22px 0 0;padding:22px 22px 40px;padding-bottom:calc(40px + env(safe-area-inset-bottom,0px));animation:sU .3s cubic-bezier(.4,0,.2,1)}
.cch{display:flex;justify-content:space-between;align-items:center;margin-bottom:18px}
.cch .cct{font-size:18px;font-weight:700}
.cch .ccx{width:32px;height:32px;border-radius:50%;background:var(--card);border:none;font-size:14px;cursor:pointer}
.cch .ccx:active{opacity:.6}
.cbx{text-align:center;padding:26px 18px;background:var(--card);border-radius:16px;margin-bottom:14px}
.cnm{font-size:32px;font-weight:700;letter-spacing:7px;color:var(--blue)}
.cno{font-size:13px;color:var(--sub);margin-top:8px}
.ci2{width:100%;height:54px;border-radius:27px;border:2px solid #DDD;padding:0 18px;font-size:22px;text-align:center;letter-spacing:5px;outline:none}
.ci2:focus{border-color:var(--blue)}
.cg{width:100%;height:50px;border-radius:25px;background:var(--blue);color:#fff;border:none;font-size:16px;font-weight:600;cursor:pointer;margin-top:12px}
.cg:active{opacity:.8}

.toast{position:fixed;bottom:220px;left:50%;transform:translateX(-50%) translateY(20px);background:rgba(0,0,0,.75);color:#fff;padding:12px 24px;border-radius:24px;font-size:15px;z-index:9999;opacity:0;transition:all .3s ease;pointer-events:none}
.toast.sh{opacity:1;transform:translateX(-50%) translateY(0)}
@keyframes sp{to{transform:rotate(360deg)}}
.spn{display:inline-block;width:20px;height:20px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:sp .7s linear infinite}
</style>
</head>
<body>

<div id="sp"><img src="logo.png" alt=""><div class="sn">iLocation</div></div>

<div id="st" class="hidden">
  <div class="st-top"><img src="logo.png" alt=""><div class="sn">iLocation</div></div>
  <div class="st-t">사용 유형을 선택해주세요</div>
  <div class="st-cards">
    <div class="st-c" data-r="parent" onclick="pk('parent')"><div class="ci"><svg viewBox="0 0 34 34"><circle cx="17" cy="11" r="6.5" fill="#999"/><path d="M7 29c0-5.5 4.5-10 10-10s10 4.5 10 10" fill="#999"/></svg></div><div class="ct">부모입니다</div></div>
    <div class="st-c" data-r="child" onclick="pk('child')"><div class="ci"><svg viewBox="0 0 34 34"><circle cx="17" cy="11" r="6.5" fill="#999"/><path d="M7 29c0-5.5 4.5-10 10-10s10 4.5 10 10" fill="#999"/></svg></div><div class="ct">자녀입니다</div></div>
  </div>
  <div class="st-btn"><button class="bb" id="nx" disabled onclick="gl()">다음</button></div>
</div>

<div id="lg" class="hidden">
  <div class="lg-top"><img src="logo.png" alt=""><div class="sn">iLocation</div></div>
  <div class="lg-mid"><div class="lt">로그인</div><input class="li" id="id" placeholder="아이디" autocomplete="off"><input class="li" id="pw" placeholder="비밀번호" type="password"><div class="le" id="er"></div></div>
  <div class="lg-bot"><button class="lb" onclick="dL()">로그인</button><div class="su-link">계정이 없으신가요? <a href="#" onclick="sSU(event)">회원가입</a></div></div>
</div>

<div id="su" class="hidden">
  <div class="sc">
    <div class="sh2"><div class="st2">회원가입</div><button class="sx" onclick="hSU()">✕</button></div>
    <div class="ir"><input class="sf" id="si" placeholder="아이디" autocomplete="off"><button class="ick" onclick="cI()">중복확인</button></div>
    <div class="im" id="im"></div>
    <input class="sf" id="sp2" placeholder="비밀번호" type="password"><input class="sf" id="s2" placeholder="비밀번호 확인" type="password"><input class="sf" id="sn" placeholder="이름">
    <button class="ssb" onclick="dSU()">회원가입</button><div class="se" id="se"></div>
  </div>
</div>

<div id="ap" class="hidden">
  <div id="mw"><iframe id="mf" src="about:blank"></iframe></div>
  
  <div id="fmodal">
    <div id="fhandle"><div class="bar"></div></div>
    
    <div id="fcontent">
      <div class="fm-panel active" id="pan-home">
        <div class="fm-lbl">One UI</div>
        <div class="fm-he">
          <div class="fm-lo"><img src="logo.png"></div>
          <div><div class="fm-ti" id="ht-title">iLocation</div><div class="fm-su" id="ht-sub">위치 수집중</div></div>
        </div>
        <div id="hc"></div>
      </div>
      <div class="fm-panel" id="pan-members">
        <div class="fm-lbl">맴버</div>
        <div id="mc2"></div>
      </div>
    </div>
    <div class="fm-tabs">
      <div class="ft a" data-t="home" onclick="goTab('home')"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 3L3 10.5V21h6v-6h6v6h6V10.5z"/></svg><span>홈</span></div>
      <div class="ft" data-t="members" onclick="goTab('members')"><svg viewBox="0 0 24 24" fill="currentColor"><circle cx="12" cy="8" r="4"/><path d="M4 21c0-4.4 3.6-8 8-8s8 3.6 8 8"/></svg><span>맴버</span></div>
      <div class="ft" data-t="more" onclick="goTab('more')"><svg viewBox="0 0 24 24" fill="currentColor"><circle cx="6" cy="12" r="1.5"/><circle cx="12" cy="12" r="1.5"/><circle cx="18" cy="12" r="1.5"/></svg><span>더보기</span></div>
    </div>
  </div>
</div>

<div id="more-screen" class="hidden">
  <div class="ms-header">
    <button class="ms-back" onclick="closeMore()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M15 18l-6-6 6-6"/></svg>
    </button>
    <div class="ms-title">더보기</div>
  </div>
  <div class="ms-content" id="mr2"></div>
</div>

<div id="cm" class="hidden"><div class="cb"><div class="cch"><div class="cct" id="cct">코드</div><button class="ccx" onclick="cC()">✕</button></div><div id="ccv"></div></div></div>
<div class="toast" id="to"></div>

<script>
const A='https://jaewondev7.pythonanywhere.com';
let me=null,ro=null,fm=[],curTab='home',prevTab='home',locInterval=null,myLat=null,myLon=null;
const PS='<svg viewBox="0 0 34 34"><circle cx="17" cy="11" r="6.5" fill="#999"/><path d="M7 29c0-5.5 4.5-10 10-10s10 4.5 10 10" fill="#999"/></svg>';

function saveLogin(u){try{localStorage.setItem('iloc_user',JSON.stringify(u));}catch(e){}}
function getLogin(){try{return JSON.parse(localStorage.getItem('iloc_user'));}catch(e){return null;}}
function clearLogin(){try{localStorage.removeItem('iloc_user');}catch(e){}}

window.addEventListener('DOMContentLoaded',()=>{
  const s=getLogin();
  if(s){me=s;ro=s.role;document.getElementById('sp').classList.add('out');setTimeout(()=>{document.getElementById('sp').classList.add('hidden');document.getElementById('st').classList.add('hidden');document.getElementById('lg').classList.add('hidden');eA();},500);return;}
  setTimeout(()=>{const sp=document.getElementById('sp');sp.classList.add('out');setTimeout(()=>{sp.classList.add('hidden');document.getElementById('st').classList.remove('hidden');},500);},1400);
  document.getElementById('pw').addEventListener('keydown',e=>{if(e.key==='Enter')dL();});
});

function pk(r){ro=r;document.querySelectorAll('.st-c').forEach(c=>c.classList.toggle('s',c.dataset.r===r));document.getElementById('nx').disabled=false;}
function gl(){document.getElementById('st').classList.add('hidden');document.getElementById('lg').classList.remove('hidden');document.getElementById('id').focus();}
function sSU(e){e.preventDefault();document.getElementById('su').classList.remove('hidden');document.getElementById('si').focus();}
function hSU(){document.getElementById('su').classList.add('hidden');['se','im','si','sp2','s2','sn'].forEach(i=>{const el=document.getElementById(i);if(el.tagName==='INPUT')el.value='';else el.textContent='';});iO=false;}
let iO=false;
async function cI(){const id=document.getElementById('si').value.trim(),m=document.getElementById('im');if(!id){m.textContent='아이디를 입력하세요.';m.className='im no';return;}try{const r=await fetch(A+'/api/auth/check_id',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({username:id})});const d=await r.json();if(d.available){m.textContent='사용 가능합니다.';m.className='im ok';iO=true;}else{m.textContent='이미 사용 중입니다.';m.className='im no';iO=false;}}catch{m.textContent='오류';m.className='im no';}}
async function dSU(){const id=document.getElementById('si').value.trim(),pw=document.getElementById('sp2').value,p2=document.getElementById('s2').value,nm=document.getElementById('sn').value.trim(),er=document.getElementById('se');if(!id||!pw||!nm){er.textContent='모든 필드를 입력하세요.';return;}if(!iO){er.textContent='중복확인을 해주세요.';return;}if(pw!==p2){er.textContent='비밀번호가 다릅니다.';return;}try{const r=await fetch(A+'/api/auth/signup',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({username:id,password:pw,name:nm,role:ro})});const d=await r.json();if(d.status==='success'){hSU();document.getElementById('id').value=id;document.getElementById('pw').value=pw;dL();}else{er.textContent=d.error||'실패';}}catch{er.textContent='네트워크 오류';}}

async function dL(){const id=document.getElementById('id').value.trim(),pw=document.getElementById('pw').value,er=document.getElementById('er');if(!id||!pw){er.textContent='아이디와 비밀번호를 입력하세요.';return;}try{const r=await fetch(A+'/api/auth/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({username:id,password:pw})});const d=await r.json();if(d.status==='success'){me=d.user;if(me.role!==ro){er.textContent='역할이 다릅니다.';return;}saveLogin(me);eA();}else{er.textContent=d.error||'로그인 실패';}}catch{er.textContent='네트워크 오류';}}

/* ===== 앱 연결: 로그인 저장 + 권한/추적 시작 ===== */
function eA(){
  document.getElementById('lg').classList.add('hidden');
  document.getElementById('ap').classList.remove('hidden');
  // 앱에 자녀 여부 + username 저장
  if(typeof AndroidInterface!=='undefined'){
    if(AndroidInterface.setIsChild){
      AndroidInterface.setIsChild(me.role==='child');
    }
  }
  // 자녀인 경우: 권한 요청 → 권한 승인 후 추적 시작
  if(me.role==='child'){
    rP(function(){
      // 권한 승인 후 위치 수집 시작
      startLocUpdate();
    });
  }else{
    if(typeof AndroidInterface!=='undefined'){
      if(AndroidInterface.stopNativeLocationSync)try{AndroidInterface.stopNativeLocationSync();}catch(e){}
      if(AndroidInterface.stopTracking)try{AndroidInterface.stopTracking();}catch(e){}
    }
  }
  lF();lM();
  setTimeout(()=>{if(!window._sheetInit){window._sheetInit=true;initSheet();}},800);
}

/* 권한 요청 + 콜백 */
function rP(cb){
  if(typeof AndroidInterface!=='undefined'&&AndroidInterface.requestPermissions){
    AndroidInterface.requestPermissions();
  }
  // 네이티브 권한 요청 후 콜백 실행
  if(typeof AndroidInterface!=='undefined'&&AndroidInterface.hasLocationPermission){
    // 권한이 이미 있으면 바로 콜백
    if(AndroidInterface.hasLocationPermission()){
      if(cb)cb();
      return;
    }
  }
  // 브라우저 위치 권한 요청 (표시용)
  if('geolocation'in navigator)navigator.geolocation.getCurrentPosition(()=>{if(cb)cb();},()=>{if(cb)cb();});
  if('Notification'in window)Notification.requestPermission();
}

/* 네이티브 위치 수집 사용 (10초마다 앱에서 직접 서버 전송) */
function startLocUpdate(){
  if(locInterval)return;
  // 네이티브에 위치 수집 시작 알림 (10초마다 서버 전송)
  if(typeof AndroidInterface!=='undefined'&&AndroidInterface.startNativeLocationSync&&me){
    try{AndroidInterface.startNativeLocationSync(me.username);}catch(e){}
  }
  // UI 업데이트를 위해 10초마다 지도 업데이트
  locInterval=setInterval(()=>{uM();},10000);
}

/* 네이티브에서 위치 업데이트 시 호출됨 (window.onNativeLocation) */
window.onNativeLocation=function(lat,lon){
  myLat=lat;myLon=lon;
  uM();
};

function rMo(){const l=document.getElementById('mr2');let h='';if(me.role==='parent'){h+=`<button class="fmb" onclick="sG()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg><span>연결 코드 발급</span></button>`;}else{h+=`<button class="fmb" onclick="sI()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 2l-2 2m-7.61 7.61a5.5 5.5 0 1 1-7.778 7.778 5.5 5.5 0 0 1 7.777-7.777zm0 0L15.5 7.5m0 0l3 3L22 7l-3-3m-3.5 3.5L19 4"/></svg><span>부모와 연결하기</span></button>`;}h+=`<button class="fmb da" onclick="doLogout()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg><span>로그아웃</span></button>`;l.innerHTML=h;}

function doLogout(){
  clearLogin();
  if(locInterval){clearInterval(locInterval);locInterval=null;}
  if(typeof AndroidInterface!=='undefined'){
    if(AndroidInterface.setIsChild)AndroidInterface.setIsChild(false);
    if(AndroidInterface.stopNativeLocationSync)try{AndroidInterface.stopNativeLocationSync();}catch(e){}
    if(AndroidInterface.stopTracking)try{AndroidInterface.stopTracking();}catch(e){}
  }
  me=null;fm=[];
  document.getElementById('ap').classList.add('hidden');
  document.getElementById('lg').classList.remove('hidden');
  document.getElementById('id').value='';document.getElementById('pw').value='';document.getElementById('er').textContent='';
}

/* 탭 전환 및 더보기 풀스크린 제어 로직 */
function goTab(t){
  if(t==='more'){
    openMore();
    return;
  }
  if(t===curTab)return;
  prevTab=t;
  document.querySelectorAll('.ft').forEach(el=>el.classList.toggle('a',el.dataset.t===t));
  document.querySelectorAll('.fm-panel').forEach(p=>p.classList.remove('active'));
  const target=document.getElementById('pan-'+t);
  if(target)target.classList.add('active');
  curTab=t;
}

function openMore(){
  const ms=document.getElementById('more-screen');
  ms.classList.add('open');
  history.pushState({page:'more'},'','#more');
  document.querySelectorAll('.ft').forEach(el=>el.classList.toggle('a',el.dataset.t==='more'));
}

function closeMore(){
  if(document.getElementById('more-screen').classList.contains('open')) {
    history.back(); // History API를 통해 뒤로가기 발생
  }
}

// 하드웨어 뒤로가기 버튼 감지
window.addEventListener('popstate', (e) => {
  const ms=document.getElementById('more-screen');
  if(ms.classList.contains('open')){
    ms.classList.remove('open');
    // 활성화된 탭을 이전 탭으로 시각적 복구
    document.querySelectorAll('.ft').forEach(el=>el.classList.toggle('a',el.dataset.t===prevTab));
  }
});

/* SHEET DRAG */
function initSheet(){
  const ha=document.getElementById('fhandle');
  const fm=document.getElementById('fmodal');
  const fc=document.getElementById('fcontent');
  if(!ha||!fm||!fc)return;

  const TAB_H=68;
  const HANDLE_H=27; // 패딩 및 바 높이 합
  let startY=0,startH=0,dragging=false,curH=0;

  function getHeights(){
    const avail=window.innerHeight-30-TAB_H-HANDLE_H;
    return {collapsed:0,default:Math.min(280,avail*0.45),expanded:Math.floor(avail*0.75)};
  }

  function applyState(idx){
    const h=getHeights();
    const vals=[h.collapsed,h.default,h.expanded];
    curH=vals[idx];
    fm.style.transition='height .35s cubic-bezier(.4,0,.2,1)';
    fm.style.height=(curH+TAB_H+HANDLE_H)+'px';
    fc.style.height=curH+'px';
  }

  function onDown(e){
    dragging=true;
    startY=e.type.includes('touch')?e.touches[0].clientY:e.clientY;
    startH=curH;
    fm.style.transition='none';fc.style.transition='none';
  }
  function onMove(e){
    if(!dragging)return;
    e.preventDefault();
    const y=e.type.includes('touch')?e.touches[0].clientY:e.clientY;
    const delta=startY-y;
    const h=getHeights();
    curH=Math.max(h.collapsed,Math.min(startH+delta,h.expanded));
    fc.style.height=curH+'px';
    fm.style.height=(curH+TAB_H+HANDLE_H)+'px';
  }
  function onUp(){
    if(!dragging)return;
    dragging=false;
    fm.style.transition='height .35s cubic-bezier(.4,0,.2,1)';
    const h=getHeights();
    const d=[Math.abs(curH-h.collapsed),Math.abs(curH-h.default),Math.abs(curH-h.expanded)];
    applyState(d.indexOf(Math.min(...d)));
  }

  ha.addEventListener('touchstart',onDown,{passive:false});
  ha.addEventListener('mousedown',onDown);
  document.addEventListener('touchmove',onMove,{passive:false});
  document.addEventListener('mousemove',onMove);
  document.addEventListener('touchend',onUp);
  document.addEventListener('mouseup',onUp);

  applyState(1);
}

function lM(){document.getElementById('mf').src=A+'/map';}
function uM(){
  const f=document.getElementById('mf');
  if(!f.contentWindow)return;
  let list=[...fm];
  // 자녀인 경우 내 위치를 목록에 포함
  if(myLat!==null&&myLon!==null&&me){
    const selfIdx=list.findIndex(m=>m.username===me.username);
    const selfData={username:me.username,name:me.name||'나',role:me.role,lat:myLat,lon:myLon,last_updated:Math.floor(Date.now()/1000)};
    if(selfIdx>=0)list[selfIdx]=selfData;
    else list=[selfData,...list];
  }
  f.contentWindow.postMessage({type:'UPDATE_MARKERS',familyList:list,centerUsername:me?me.username:null,forceCenter:true},'*');
}

async function sC(){const code=document.getElementById('ci').value.trim();if(code.length!==6){toast('6자리를 입력하세요.');return;}try{const r=await fetch(A+'/api/child/pair',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({username:me.username,code})});const d=await r.json();if(d.status==='paired'){cC();toast('연결되었습니다!');lF();}else toast(d.error||'유효하지 않은 코드');}catch{toast('네트워크 오류');}}
